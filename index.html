<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Mesi Insieme ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to bottom,#ffb6c1,#fff);
    overflow:hidden;
    text-align:center;
    color:white;
}

.container{
    margin-top:100px;
}

h1{
    font-size:60px;
    animation:fade 3s infinite alternate;
}

p{
    font-size:24px;
    width:70%;
    margin:auto;
}

.heart{
    position:absolute;
    color:red;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
    }
    to{
        transform:translateY(110vh);
    }
}

@keyframes fade{
    from{opacity:0.5;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
    <h1>Buon 6° Mese ❤️</h1>

    <p>
        Grazie per ogni sorriso, ogni abbraccio
        e ogni momento insieme.
        Sei la mia persona preferita.
    </p>
</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*30+20+"px";
    heart.style.animationDuration=Math.random()*3+2+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
